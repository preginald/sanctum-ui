name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - run: npm run typecheck

      - run: npm run lint

      # TODO: Replace with `npm test -- --run` once vitest is configured (ticket #1676)
      - run: echo "Tests not yet configured — activate when vitest is added"

      - run: npm run build
